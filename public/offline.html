<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ออฟไลน์ · ระบบนักการภารโรง</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eef1ec;
        color: #16231f;
        font-family: 'IBM Plex Sans Thai', system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .box { max-width: 340px; }
      .logo {
        width: 76px; height: 76px; border-radius: 20px; margin: 0 auto 18px;
        background: #fff; border: 1px solid #e7eae4; padding: 6px;
        object-fit: contain; box-sizing: border-box;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #7a867e; font-size: 14px; line-height: 1.6; margin: 0 0 20px; }
      button {
        border: none; background: #0f766e; color: #fff; font-weight: 700;
        font-size: 14px; padding: 12px 20px; border-radius: 12px; cursor: pointer;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img class="logo" src="/logo.png" alt="ตราโรงเรียนสวายวิทยาคาร" />
      <h1>ออฟไลน์อยู่</h1>
      <p>ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้ในขณะนี้ กรุณาตรวจสอบการเชื่อมต่อแล้วลองใหม่อีกครั้ง</p>
      <button onclick="location.reload()">ลองใหม่อีกครั้ง</button>
    </div>
  </body>
</html>
